image: node:22.16-alpine

stages:
  - check
  - release
  - publish

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

install:
  stage: .pre
  script:
    - npm ci

lint:
  stage: check
  script:
    - npm run lint

build:
  stage: check
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour

test:
  stage: check
  script:
    - npm test

release:
  stage: release
  before_script:
    - apk add --no-cache git
    - git config user.name "gitlab-ci"
    - git config user.email "ci@gitlab.just-ai.com"
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.just-ai.com/${CI_PROJECT_PATH}.git"
    - git fetch origin --tags --unshallow || git fetch origin --tags
  script:
    - |
      # Skip if last commit is a release commit (avoid infinite loop)
      LAST_MSG=$(git log -1 --pretty=format:"%s")
      if echo "$LAST_MSG" | grep -q "^release: v"; then
        echo "Last commit is a release — skipping"
        exit 0
      fi

      # Determine bump type from commits since last tag
      LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
      if [ -z "$LAST_TAG" ]; then
        RANGE="HEAD"
      else
        RANGE="${LAST_TAG}..HEAD"
      fi

      COMMITS=$(git log --pretty=format:"%s" $RANGE)

      if echo "$COMMITS" | grep -qi "BREAKING CHANGE\|^.*!:"; then
        BUMP="major"
      elif echo "$COMMITS" | grep -qi "^feat"; then
        BUMP="minor"
      else
        BUMP="patch"
      fi

      echo "Bump type: $BUMP"
      echo "Last tag: ${LAST_TAG:-none}"

      # Bump version, create tag, push
      NEW_VERSION=$(npm version $BUMP --no-git-tag-version)
      git tag -d "${NEW_VERSION}" 2>/dev/null || true
      git add package.json package-lock.json
      git commit -m "release: ${NEW_VERSION}"
      git tag "${NEW_VERSION}"
      git push origin HEAD:main --tags
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_COMMIT_TAG == null
      when: on_success

publish:
  stage: publish
  script:
    - npm run build
    - npm config set //registry.npmjs.org/:_authToken ${NPM_TOKEN}
    - npm publish --access public
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
